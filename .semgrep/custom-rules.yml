rules:
  - id: hono-html-injection
    pattern: 'c.html(`...`)'
    message: >-
      Potential XSS: c.html() with template literal may contain unsanitized
      interpolation. Use static strings or escape user input before embedding
      in HTML responses.
    languages:
      - typescript
    severity: ERROR
    metadata:
      category: security

  - id: hardcoded-jwt-secret
    patterns:
      - pattern-either:
          - pattern: 'sign($PAYLOAD, "...")'
          - pattern: 'verify($TOKEN, "...")'
    message: >-
      Hardcoded JWT secret detected. Use environment variables (e.g.,
      c.env.JWT_SECRET) instead of string literals for signing and verification.
    languages:
      - typescript
    severity: ERROR
    metadata:
      category: security

  - id: cookie-missing-httponly
    pattern: 'setCookie($CTX, $NAME, $VALUE, {..., httpOnly: false, ...})'
    message: >-
      Cookie set without httpOnly flag. All authentication and session cookies
      must use httpOnly: true to prevent JavaScript access.
    languages:
      - typescript
    severity: ERROR
    metadata:
      category: security

  - id: cookie-missing-secure
    pattern: 'setCookie($CTX, $NAME, $VALUE, {..., secure: false, ...})'
    message: >-
      Cookie set without secure flag. All cookies must use secure: true to
      ensure transmission only over HTTPS.
    languages:
      - typescript
    severity: ERROR
    metadata:
      category: security

  - id: dangerous-innerhtml
    patterns:
      - pattern-regex: 'dangerouslySetInnerHTML'
    message: >-
      Potential XSS: dangerouslySetInnerHTML bypasses React's escaping. Ensure
      content is sanitized with DOMPurify before rendering. If unavoidable,
      add a nosemgrep comment with justification.
    languages:
      - typescript
    severity: WARNING
    metadata:
      category: security

  - id: unsafe-json-parse-cast
    pattern: 'JSON.parse($X) as $TYPE'
    message: >-
      Unsafe type assertion on JSON.parse result. Use Zod schema validation
      instead of 'as' cast to ensure runtime type safety.
    languages:
      - typescript
    severity: WARNING
    metadata:
      category: security

  - id: error-stack-in-response
    patterns:
      - pattern: 'c.json({..., stack: $ERR.stack, ...}, ...)'
    message: >-
      Stack trace leaked in API response. Never expose error stack traces to
      clients — they reveal internal paths and code structure.
    languages:
      - typescript
    severity: ERROR
    metadata:
      category: security

  - id: no-raw-sql-string-concat
    pattern: 'db.run(`...${$VAR}...`)'
    message: >-
      SQL injection risk: string interpolation in raw SQL query. Use
      parameterized queries with db.run(sql, [params]) instead.
    languages:
      - typescript
    severity: ERROR
    metadata:
      category: security
