<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400;1,9..40,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,600&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" content="#8027FF" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <title>LegalCode</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // One-time SW cache bust — increment version on breaking deploys
      (function() {
        var v = '4';
        if (localStorage.getItem('lc-sw-v') !== v && 'serviceWorker' in navigator) {
          localStorage.setItem('lc-sw-v', v);
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            if (regs.length > 0) {
              regs.forEach(function(r) { r.unregister(); });
              location.reload();
            }
          });
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
